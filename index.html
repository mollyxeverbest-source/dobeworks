<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dobeworks | Мой инвентарь CS2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', Helvetica, Arial, sans-serif;
            background: #000000;
            min-height: 100vh;
            color: #ffffff;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px 16px 30px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }

        /* Экран входа */
        .login-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .greeting {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: -0.3px;
            color: #ffffff;
        }

        .avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #007aff 0%, #5856d6 100%);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.3);
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-initials {
            font-size: 52px;
            font-weight: 500;
            color: white;
            text-transform: uppercase;
        }

        .username-display {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 40px;
            color: #ffffff;
        }

        .ios-button {
            background: #007aff;
            border: none;
            border-radius: 14px;
            padding: 16px 20px;
            font-size: 17px;
            font-weight: 600;
            color: white;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ios-button:active {
            background: #0051a8;
            transform: scale(0.97);
        }

        /* Главное меню */
        .main-menu {
            display: none;
        }

        /* Шапка профиля */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 16px;
            background: #1c1c1e;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .small-avatar {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #007aff 0%, #5856d6 100%);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 600;
            color: white;
            overflow: hidden;
        }

        .small-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-header-info {
            flex: 1;
        }

        .profile-header-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .profile-header-status {
            font-size: 14px;
            color: #8e8e93;
        }

        /* Нижняя навигация */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 400px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 10px 20px 20px;
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: #8e8e93;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-item.active {
            color: #007aff;
        }

        .nav-icon {
            font-size: 22px;
        }

        /* Контент вкладок */
        .tab-content {
            display: none;
            padding-bottom: 80px;
        }

        .tab-content.active {
            display: block;
        }

        /* Карточки */
        .card {
            background: #1c1c1e;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        /* Баланс */
        .balance-card {
            background: linear-gradient(135deg, #007aff 0%, #5856d6 100%);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            color: white;
        }

        .balance-label {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 8px;
        }

        .balance-value {
            font-size: 44px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        /* Список скинов (для маркета и инвентаря) */
        .skin-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #1c1c1e;
            border-radius: 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .skin-item:active {
            transform: scale(0.98);
            background: #2c2c2e;
        }

        .skin-icon {
            width: 50px;
            height: 50px;
            background: #2c2c2e;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .skin-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .skin-info {
            flex: 1;
        }

        .skin-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .skin-quality {
            font-size: 11px;
            color: #8e8e93;
        }

        .skin-price {
            font-size: 16px;
            font-weight: 700;
            color: #ffd700;
        }

        .inventory-badge {
            background: #007aff;
            border-radius: 20px;
            padding: 4px 8px;
            font-size: 11px;
            color: white;
        }

        /* Кейс с анимацией */
        .case-container {
            background: linear-gradient(135deg, #1c1c1e 0%, #2c2c2e 100%);
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .case-container:active {
            transform: scale(0.98);
        }

        .case-image {
            width: 120px;
            height: 120px;
            margin: 0 auto 16px;
            background: #007aff;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .case-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .case-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .case-price {
            font-size: 24px;
            font-weight: 700;
            color: #ffd700;
            margin-bottom: 8px;
        }

        /* Анимация дропа */
        .drop-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .drop-card {
            background: #1c1c1e;
            border-radius: 28px;
            padding: 30px;
            text-align: center;
            max-width: 300px;
            width: 90%;
            animation: dropBounce 0.5s ease-out;
        }

        @keyframes dropBounce {
            0% { transform: scale(0.3); opacity: 0; }
            80% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        .drop-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .drop-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .drop-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .drop-price {
            font-size: 18px;
            color: #ffd700;
            margin-bottom: 20px;
        }

        .close-drop-btn {
            background: #007aff;
            border: none;
            border-radius: 14px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            width: 100%;
            cursor: pointer;
        }

        /* Инпут */
        .steam-input {
            width: 100%;
            padding: 14px;
            background: #1c1c1e;
            border: 1px solid #3a3a3c;
            border-radius: 14px;
            font-size: 16px;
            font-family: inherit;
            color: white;
            margin-bottom: 12px;
        }

        .steam-input:focus {
            outline: none;
            border-color: #007aff;
        }

        .info-text {
            font-size: 13px;
            color: #8e8e93;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container" id="app">

            </div>

            <!-- Вкладка Мой инвентарь -->
            <div class="tab-content" id="tab-inventory">
                <div class="card">

            <!-- Вкладка Профиль -->
            <div class="tab-content" id="tab-profile">

                </div>
            </div>

            <!-- Нижняя навигация -->
            <div class="bottom-nav">
                <div class="nav-item active" data-tab="market">

                </div>
                <div class="nav-item" data-tab="inventory">

                </div>
                <div class="nav-item" data-tab="profile">
                    <div class="nav-icon">👤</div>
                    <span>Профиль</span>
                </div>
            </div>
        </div>
    </div>

            { name: "Наклейка | isak | Париж-2023", quality: "Наклейка", iconUrl: "https://cdn.steamcommunity.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKkpou6ubhQRlxszGYjlV09K5lZm0nvL4NqrQlGhU7cB4lLuR9I3w0Qzl-hZsZGn6doeeJlE9Yl-F-wW5xLrt0pS66Z2ewCQ27g" },

        // ========== МАРКЕТ (скины для продажи) ==========
        const marketSkins = [
            { name: "AK-47 | Bloodsport", quality: "Field-Tested", price: 50, iconUrl: "https://cdn.steamcommunity.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpou7uifDhzwc3acitR09K5lZm0nvL4NbrQkWRY781n2u6Sp9iljVbl_BU-Yzr0cI7FJAM4Yl6G8wXtkLu70Mbpu8yZnSg1ujIuuw" },
            { name: "AWP | Dragon Lore", quality: "Factory New", price: 500, iconUrl: "https://cdn.steamcommunity.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot621FA957fPLQwJM9d23h5O0m_7zOq_um2pD7Mkgi7yS9IjxjwW3_EdoYz3zdoKQJAdrMl6G8wXst7zv0pO56MnNnHtkM7A" },

        ];

        // ========== ПЕРЕМЕННЫЕ ==========
        let balance = parseInt(localStorage.getItem("balance")) || 100;
        let steamLink = localStorage.getItem("steamLink") || "";
        let purchases = parseInt(localStorage.getItem("purchases")) || 0;
        let spent = parseInt(localStorage.getItem("spent")) || 0;

        // ========== DOM ЭЛЕМЕНТЫ ==========
        const loginScreen = document.getElementById("loginScreen");
        const mainMenu = document.getElementById("mainMenu");
        const greetingText = document.getElementById("greetingText");
        const avatarContainer = document.getElementById("avatarContainer");
        const avatarInitials = document.getElementById("avatarInitials");
        const usernameDisplay = document.getElementById("usernameDisplay");
        const menuAvatarContainer = document.getElementById("menuAvatarContainer");
        const menuAvatarInitials = document.getElementById("menuAvatarInitials");
        const menuUsername = document.getElementById("menuUsername");
        const startBtn = document.getElementById("startBtn");
        const balanceValue = document.getElementById("balanceValue");
        const topupBtn = document.getElementById("topupBtn");
        const steamLinkInput = document.getElementById("steamLinkInput");
        const saveSteamBtn = document.getElementById("saveSteamBtn");
        const purchasesCount = document.getElementById("purchasesCount");
        const spentAmount = document.getElementById("spentAmount");
        const skinsContainer = document.getElementById("skinsList");
        const inventoryContainer = document.getElementById("inventoryList");

        // ========== УСТАНОВКА АВАТАРКИ ==========
        function setAvatar(element, initialsElement, photoUrl, initials) {
            if (photoUrl && photoUrl.length > 0) {
                const img = document.createElement('img');
                img.src = photoUrl;
                element.innerHTML = '';
                element.appendChild(img);
            } else {
                initialsElement.textContent = initials;
                element.innerHTML = '';
                element.appendChild(initialsElement);
            }
        }

        greetingText.textContent = `Здравствуйте, ${firstName}`;
        usernameDisplay.textContent = fullName || firstName;
        menuUsername.textContent = fullName || firstName;

        if (userPhotoUrl) {
            const bigImg = document.createElement('img');
            bigImg.src = userPhotoUrl;
            avatarContainer.innerHTML = '';
            avatarContainer.appendChild(bigImg);
            const smallImg = document.createElement('img');
            smallImg.src = userPhotoUrl;
            menuAvatarContainer.innerHTML = '';
            menuAvatarContainer.appendChild(smallImg);
        } else {
            avatarInitials.textContent = initial;
            menuAvatarInitials.textContent = initial;
        }

        // ========== ОБНОВЛЕНИЕ ДАННЫХ ==========
        function updateBalance() {
            balanceValue.textContent = balance;
            localStorage.setItem("balance", balance);
        }

        function updateStats() {
            purchasesCount.textContent = purchases;
            spentAmount.textContent = spent;
            localStorage.setItem("purchases", purchases);
            localStorage.setItem("spent", spent);
        }

        // ========== ОТРИСОВКА МАРКЕТА ==========
        function renderMarket() {
            skinsContainer.innerHTML = '';
            marketSkins.forEach(skin => {
                const skinItem = document.createElement('div');
                skinItem.className = 'skin-item';
                skinItem.innerHTML = `
                    <div class="skin-icon"><img src="${skin.iconUrl}" onerror="this.src='https://cdn.steamcommunity.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpou7uifDhzwc3acitR09K5lZm0nvL4NbrQkWRY781n2u6Sp9iljVbl_BU-Yzr0cI7FJAM4Yl6G8wXtkLu70Mbpu8yZnSg1ujIuuw'"></div>
                    <div class="skin-info"><div class="skin-name">${skin.name}</div><div class="skin-quality">${skin.quality}</div></div>
                    <div class="skin-price">⭐ ${skin.price}</div>
                `;
                skinItem.addEventListener('click', () => buySkin(skin.name, skin.price));
                skinsContainer.appendChild(skinItem);
            });
        }

        // ========== ОТРИСОВКА ИНВЕНТАРЯ ==========
        function renderInventory() {
            inventoryContainer.innerHTML = '';
            if (inventoryItems.length === 0) {
                inventoryContainer.innerHTML = '<div class="card" style="text-align: center;">📭 Инвентарь пуст</div>';
                return;
            }
            inventoryItems.forEach(item => {
                const invItem = document.createElement('div');
                invItem.className = 'skin-item';
                invItem.style.cursor = 'default';
                invItem.innerHTML = `
                    <div class="skin-icon"><img src="${item.iconUrl}" onerror="this.src='https://cdn.steamcommunity.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpou6ryFA957PvQaTJY09SzlZaS2aX3MOvSlzlQucdy2LqU9NmnjAzl_UJoYmqldYSTIQI_NV_X81bvkufxxcjryPo2vmI'"></div>
                    <div class="skin-info"><div class="skin-name">${item.name}</div><div class="skin-quality">${item.quality}</div></div>
                    <div class="inventory-badge">В инвентаре</div>
                `;
                inventoryContainer.appendChild(invItem);
            });
        }

        // ========== ПОКУПКА ==========
        function buySkin(skinName, price) {
            if (balance >= price) {
                balance -= price;
                purchases++;
                spent += price;
                updateBalance();
                updateStats();
                tg.showAlert(`✅ Вы купили "${skinName}" за ${price} Stars!\nСкин будет отправлен на ваш Steam аккаунт.`);
                tg.sendData(JSON.stringify({ action: "purchase", skin: skinName, price: price }));
            } else {
                tg.showAlert(`❌ Не хватает Stars!\nНужно: ${price}, у вас: ${balance}`);
            }
        }

        // ========== КЕЙС С АНИМАЦИЕЙ ДРОПА ==========
        const dropItems = [
            { name: "★ Karambit | Doppler", price: 5000, iconUrl: "https://cdn.steamcommunity.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot7HxfDhhwszHeCRA7dizq5OZm_bzDL7c3W9E5cB0luHEodSh2QK3_hA5ZGz6dI7HcgA3Zg6F-wXpx-7t15K4vczAyXJm7D9V3nY" },
            { name: "AWP | Gungnir", price: 3000, iconUrl: "https://cdn.steamcommunity.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot621FA957fPLcQJT6d63qb-HmPbwN7LEgn8u7MxkhbmRr4z2jQ2xrxYtZ2r6ddOXIQRrZA-G8wO8x-bv1Ja47cvJynXo-9Wln3VvsQ" },
            { name: "AK-47 | Fire Serpent", price: 600, iconUrl: "https://cdn.steamcommunity.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot7HxfDhjxszJYj1H4-G3koG0hPz2N7LEgn8u7MxkhbmRr4z2jQ2xrxYtZ2r6ddOXIQRrZA-G8wO8x-bv1Ja47cvJynXo-9Wln3VvsQ" }
        ];

        function openCase() {
            const price = 100;
            if (balance >= price) {
                balance -= price;
                updateBalance();
                
                const randomItem = dropItems[Math.floor(Math.random() * dropItems.length)];
                const dropOverlay = document.createElement('div');
                dropOverlay.className = 'drop-overlay';
                dropOverlay.innerHTML = `
                    <div class="drop-card">
                        <div class="drop-icon"><img src="${randomItem.iconUrl}"></div>
                        <div class="drop-name">${randomItem.name}</div>
                        <div class="drop-price">⭐ ${randomItem.price}</div>
                        <button class="close-drop-btn" id="closeDropBtn">Забрать</button>
                    </div>
                `;
                document.body.appendChild(dropOverlay);
                document.getElementById('closeDropBtn').addEventListener('click', () => {
                    dropOverlay.remove();
                    tg.showAlert(`🎉 Поздравляем! Вам выпал ${randomItem.name} стоимостью ${randomItem.price} Stars!`);
                    tg.sendData(JSON.stringify({ action: "case_drop", item: randomItem.name, price: randomItem.price }));
                });
            } else {
                tg.showAlert(`❌ Не хватает Stars для открытия кейса! Нужно 100 Stars.`);
            }
        }

        // ========== НАВИГАЦИЯ ==========
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.querySelector(`.nav-item[data-tab="${tabId}"]`).classList.add('active');
        }

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => switchTab(item.dataset.tab));
        });

        startBtn.addEventListener('click', () => {
            loginScreen.style.display = 'none';
            mainMenu.style.display = 'block';
        });

        topupBtn.addEventListener('click', () => {
            tg.sendData(JSON.stringify({ action: "topup", user_id: user.id }));
            tg.showAlert("💎 Пополнение баланса\n\nНапишите @DobeworksSupport для оплаты в Telegram Stars");
        });

        saveSteamBtn.addEventListener('click', () => {
            const link = steamLinkInput.value.trim();
            if (link) {
                localStorage.setItem("steamLink", link);
                steamLink = link;
                tg.showAlert("✅ Ссылка сохранена!");
            } else {
                tg.showAlert("❌ Введите ссылку для обмена");
            }
        });

        document.getElementById("caseContainer").addEventListener('click', openCase);

        // Инициализация
        renderMarket();
        renderInventory();
        updateBalance();
        updateStats();
        if (steamLink) steamLinkInput.value = steamLink;
        tg.MainButton.hide();
    </script>
</body>
</html>
