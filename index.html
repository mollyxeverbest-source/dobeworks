<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dobeworks Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', Helvetica, Arial, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            color: #1c1c1e;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px 16px 30px;
        }

        /* iOS стиль */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }

        /* Экран входа */
        .login-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .greeting {
            font-size: 28px;
            font-weight: 600;
            color: #1c1c1e;
            margin-bottom: 30px;
            letter-spacing: -0.3px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #007aff 0%, #5856d6 100%);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.3);
        }

        .avatar-initials {
            font-size: 52px;
            font-weight: 500;
            color: white;
            text-transform: uppercase;
        }

        .username-display {
            font-size: 22px;
            font-weight: 600;
            color: #1c1c1e;
            margin-bottom: 40px;
        }

        .ios-button {
            background: #007aff;
            border: none;
            border-radius: 14px;
            padding: 16px 20px;
            font-size: 17px;
            font-weight: 600;
            color: white;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ios-button:active {
            background: #0051a8;
            transform: scale(0.97);
        }

        .ios-button-outline {
            background: transparent;
            border: 1px solid #007aff;
            color: #007aff;
        }

        .ios-button-outline:active {
            background: rgba(0, 122, 255, 0.1);
        }

        /* Главное меню */
        .main-menu {
            display: none;
        }

        /* Шапка профиля в меню */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 16px;
            background: #f2f2f7;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .small-avatar {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #007aff 0%, #5856d6 100%);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 600;
            color: white;
        }

        .profile-header-info {
            flex: 1;
        }

        .profile-header-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .profile-header-status {
            font-size: 14px;
            color: #8e8e93;
        }

        /* Нижняя навигация iOS */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 10px 20px 20px;
            border-top: 0.5px solid rgba(0, 0, 0, 0.1);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: #8e8e93;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-item.active {
            color: #007aff;
        }

        .nav-icon {
            font-size: 22px;
        }

        /* Контент вкладок */
        .tab-content {
            display: none;
            padding-bottom: 80px;
        }

        .tab-content.active {
            display: block;
        }

        /* Карточки */
        .card {
            background: #f2f2f7;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        /* Баланс */
        .balance-card {
            background: linear-gradient(135deg, #007aff 0%, #5856d6 100%);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            color: white;
        }

        .balance-label {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 8px;
        }

        .balance-value {
            font-size: 44px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        /* Инпут */
        .steam-input {
            width: 100%;
            padding: 14px;
            background: #f2f2f7;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-family: inherit;
            margin-bottom: 12px;
        }

        .steam-input:focus {
            outline: none;
            background: #e5e5ea;
        }

        .info-text {
            font-size: 13px;
            color: #8e8e93;
            margin-bottom: 16px;
        }

        /* Список скинов */
        .skin-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #f2f2f7;
            border-radius: 14px;
            margin-bottom: 8px;
        }

        .skin-icon {
            width: 44px;
            height: 44px;
            background: #e5e5ea;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .skin-info {
            flex: 1;
        }

        .skin-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .skin-game {
            font-size: 12px;
            color: #8e8e93;
        }

        .skin-price {
            font-size: 16px;
            font-weight: 700;
            color: #007aff;
        }

        /* Темная тема */
        @media (prefers-color-scheme: dark) {
            body {
                background: #000000;
                color: #ffffff;
            }
            .profile-header, .card, .skin-item, .steam-input {
                background: #1c1c1e;
            }
            .steam-input {
                color: white;
            }
            .steam-input::placeholder {
                color: #8e8e93;
            }
            .skin-icon {
                background: #2c2c2e;
            }
            .bottom-nav {
                background: rgba(0, 0, 0, 0.95);
                border-top-color: rgba(255, 255, 255, 0.1);
            }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Экран входа -->
        <div id="loginScreen" class="login-screen fade-in">
            <div class="greeting" id="greetingText">Здравствуйте, </div>
            <div class="avatar">
                <div class="avatar-initials" id="avatarInitials"></div>
            </div>
            <div class="username-display" id="usernameDisplay"></div>
            <button class="ios-button" id="startBtn">Начать</button>
        </div>

        <!-- Главное меню -->
        <div id="mainMenu" class="main-menu">
            <!-- Шапка с профилем -->
            <div class="profile-header">
                <div class="small-avatar" id="menuAvatar">М</div>
                <div class="profile-header-info">
                    <div class="profile-header-name" id="menuUsername"></div>
                    <div class="profile-header-status">⚡ Активен</div>
                </div>
            </div>

            <!-- Вкладки -->
            <div class="tab-content active" id="tab-market">
                <div class="balance-card">
                    <div class="balance-label">💰 Твой баланс</div>
                    <div class="balance-value" id="balanceValue">0</div>
                    <button class="ios-button" id="topupBtn" style="background: rgba(255,255,255,0.2);">Пополнить</button>
                </div>

                <div class="card">
                    <div class="card-title">🎮 Популярные скины</div>
                    <div class="skin-item" data-skin="AK-47 | Bloodsport" data-price="50" data-game="CS2">
                        <div class="skin-icon">🔫</div>
                        <div class="skin-info">
                            <div class="skin-name">AK-47 | Bloodsport</div>
                            <div class="skin-game">CS2</div>
                        </div>
                        <div class="skin-price">50 ★</div>
                    </div>
                    <div class="skin-item" data-skin="AWP | Dragon Lore" data-price="500" data-game="CS2">
                        <div class="skin-icon">🎯</div>
                        <div class="skin-info">
                            <div class="skin-name">AWP | Dragon Lore</div>
                            <div class="skin-game">CS2</div>
                        </div>
                        <div class="skin-price">500 ★</div>
                    </div>
                    <div class="skin-item" data-skin="Arcana | Pudge" data-price="200" data-game="Dota 2">
                        <div class="skin-icon">🔪</div>
                        <div class="skin-info">
                            <div class="skin-name">Arcana | Pudge</div>
                            <div class="skin-game">Dota 2</div>
                        </div>
                        <div class="skin-price">200 ★</div>
                    </div>
                </div>
            </div>

            <div class="tab-content" id="tab-profile">
                <div class="card">
                    <div class="card-title">🔗 Steam аккаунт</div>
                    <input type="text" class="steam-input" id="steamLinkInput" placeholder="Введите ссылку для обмена">
                    <div class="info-text">Ссылка обмена нужна для отправки скинов</div>
                    <button class="ios-button" id="saveSteamBtn">Сохранить ссылку</button>
                </div>

                <div class="card">
                    <div class="card-title">📊 Статистика</div>
                    <div class="skin-item" style="justify-content: space-between;">
                        <span>Всего покупок</span>
                        <span id="purchasesCount" style="font-weight: 700;">0</span>
                    </div>
                    <div class="skin-item" style="justify-content: space-between;">
                        <span>Потрачено Stars</span>
                        <span id="spentAmount" style="font-weight: 700;">0</span>
                    </div>
                </div>
            </div>

            <!-- Нижняя навигация -->
            <div class="bottom-nav">
                <div class="nav-item active" data-tab="market">
                    <div class="nav-icon">🛍️</div>
                    <span>Маркет</span>
                </div>
                <div class="nav-item" data-tab="profile">
                    <div class="nav-icon">👤</div>
                    <span>Профиль</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Данные пользователя
        let user = tg.initDataUnsafe?.user;
        if (!user || !user.id) {
            user = { first_name: "Гость", last_name: "", id: 123456789 };
        }

        const firstName = user.first_name || "Гость";
        const fullName = `${firstName} ${user.last_name || ""}`.trim();
        const initial = firstName.charAt(0).toUpperCase();

        // Переменные
        let balance = 0;
        let steamLink = localStorage.getItem("steamLink") || "";
        let purchases = parseInt(localStorage.getItem("purchases")) || 0;
        let spent = parseInt(localStorage.getItem("spent")) || 0;

        // DOM элементы
        const loginScreen = document.getElementById("loginScreen");
        const mainMenu = document.getElementById("mainMenu");
        const greetingText = document.getElementById("greetingText");
        const avatarInitials = document.getElementById("avatarInitials");
        const usernameDisplay = document.getElementById("usernameDisplay");
        const menuAvatar = document.getElementById("menuAvatar");
        const menuUsername = document.getElementById("menuUsername");
        const startBtn = document.getElementById("startBtn");
        const balanceValue = document.getElementById("balanceValue");
        const topupBtn = document.getElementById("topupBtn");
        const steamLinkInput = document.getElementById("steamLinkInput");
        const saveSteamBtn = document.getElementById("saveSteamBtn");
        const purchasesCount = document.getElementById("purchasesCount");
        const spentAmount = document.getElementById("spentAmount");

        // Заполняем данные
        greetingText.textContent = `Здравствуйте, ${firstName}`;
        usernameDisplay.textContent = fullName || firstName;
        avatarInitials.textContent = initial;
        menuAvatar.textContent = initial;
        menuUsername.textContent = fullName || firstName;

        // Загружаем сохраненные данные
        if (steamLink) steamLinkInput.value = steamLink;
        balanceValue.textContent = balance;
        purchasesCount.textContent = purchases;
        spentAmount.textContent = spent;

        // Функции
        function updateBalance() {
            balanceValue.textContent = balance;
            localStorage.setItem("balance", balance);
        }

        function updateStats() {
            purchasesCount.textContent = purchases;
            spentAmount.textContent = spent;
            localStorage.setItem("purchases", purchases);
            localStorage.setItem("spent", spent);
        }

        function showMainMenu() {
            loginScreen.style.display = "none";
            mainMenu.style.display = "block";
        }

        // Переключение вкладок
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.getElementById(`tab-${tabId}`).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelector(`.nav-item[data-tab="${tabId}"]`).classList.add('active');
        }

        // Кнопка "Начать"
        startBtn.addEventListener("click", () => {
            showMainMenu();
        });

        // Навигация
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                switchTab(item.dataset.tab);
            });
        });

        // Пополнение баланса (оплата боту)
        topupBtn.addEventListener("click", () => {
            tg.sendData(JSON.stringify({ 
                action: "topup", 
                user_id: user.id,
                user_name: firstName
            }));
            tg.showAlert("💎 Пополнение баланса\n\nНапишите @DobeworksSupport для оплаты в Telegram Stars");
        });

        // Сохранение Steam ссылки
        saveSteamBtn.addEventListener("click", () => {
            const link = steamLinkInput.value.trim();
            if (link) {
                localStorage.setItem("steamLink", link);
                steamLink = link;
                tg.showAlert("✅ Ссылка сохранена!");
                tg.sendData(JSON.stringify({ action: "save_steam", steam_link: link }));
            } else {
                tg.showAlert("❌ Введите ссылку для обмена");
            }
        });

        // Покупка скина
        document.querySelectorAll('.skin-item').forEach(item => {
            item.addEventListener('click', () => {
                const skinName = item.dataset.skin;
                const price = parseInt(item.dataset.price);
                const game = item.dataset.game;

                if (balance >= price) {
                    balance -= price;
                    purchases++;
                    spent += price;
                    updateBalance();
                    updateStats();
                    
                    tg.showAlert(`✅ Вы купили "${skinName}" за ${price} Stars!\nСкин будет отправлен на ваш Steam аккаунт.`);
                    tg.sendData(JSON.stringify({
                        action: "purchase",
                        skin: skinName,
                        price: price,
                        game: game,
                        steam_link: steamLink,
                        user_id: user.id
                    }));
                } else {
                    tg.showAlert(`❌ Не хватает Stars!\nНужно: ${price}, у вас: ${balance}\n\nПополните баланс через кнопку "Пополнить"`);
                }
            });
        });

        // Настройка главной кнопки Telegram
        tg.MainButton.hide();
    </script>
</body>
                            </html>
