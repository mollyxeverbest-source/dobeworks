<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Rusty Project</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px 16px 30px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }

        /* Экран входа */
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: #111111;
            border-radius: 24px;
            padding: 32px 24px;
            border: 1px solid #222222;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 48px;
            font-weight: 700;
            color: #d4af37;
            letter-spacing: 2px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #d4af37;
            margin-top: 8px;
        }

        .logo-sub {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .btn {
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }

        .btn-primary {
            background: #d4af37;
            color: #0a0a0a;
        }

        .btn-primary:active {
            background: #c4a030;
            transform: scale(0.98);
        }

        .btn-steam {
            background: #1b2838;
            color: white;
            border: 1px solid #2c4056;
        }

        .btn-steam:active {
            background: #2c4056;
            transform: scale(0.98);
        }

        .btn-telegram {
            background: #2481cc;
            color: white;
            border: 1px solid #3a9bdf;
        }

        .btn-telegram:active {
            background: #3a9bdf;
            transform: scale(0.98);
        }

        /* Главное меню */
        .main-menu {
            display: none;
        }

        /* Нижняя навигация */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 400px;
            margin: 0 auto;
            background: #111111;
            display: flex;
            justify-content: space-around;
            padding: 12px 20px;
            border-top: 1px solid #222;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: #666;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-item.active {
            color: #d4af37;
        }

        /* Контент вкладок */
        .tab-content {
            display: none;
            padding-bottom: 80px;
        }

        .tab-content.active {
            display: block;
        }

        /* Карточки */
        .card {
            background: #111111;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid #222;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: #d4af37;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        .balance-card {
            background: #111111;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #222;
        }

        .balance-label {
            font-size: 13px;
            color: #666;
        }

        .balance-value {
            font-size: 32px;
            font-weight: 700;
            color: #d4af37;
        }

        .topup-btn {
            background: #d4af37;
            border: none;
            border-radius: 30px;
            padding: 10px 20px;
            font-weight: 600;
            color: #0a0a0a;
            cursor: pointer;
            font-size: 14px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #222;
        }

        .info-label {
            font-size: 14px;
            color: #666;
        }

        .info-value {
            font-size: 14px;
            font-weight: 500;
            color: #e0e0e0;
        }

        .info-value.steam {
            color: #66c0f4;
        }

        .info-value.telegram {
            color: #2481cc;
        }

        .link-btn {
            background: transparent;
            border: 1px solid #d4af37;
            border-radius: 30px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 500;
            color: #d4af37;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
        }

        .link-btn:active {
            background: rgba(212, 175, 55, 0.1);
        }

        .disconnect-btn {
            border-color: #ff3b30;
            color: #ff3b30;
        }

        .action-card {
            background: #111111;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #222;
            margin-bottom: 12px;
        }

        .action-card:active {
            transform: scale(0.98);
            background: #161616;
        }

        .action-text {
            flex: 1;
        }

        .action-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .action-subtitle {
            font-size: 12px;
            color: #666;
        }

        .action-arrow {
            color: #d4af37;
            font-size: 16px;
        }

        .social-links {
            display: flex;
            justify-content: space-around;
            gap: 12px;
            margin-top: 16px;
        }

        .social-btn {
            flex: 1;
            background: #111111;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #222;
            font-size: 14px;
            font-weight: 500;
        }

        .social-btn:active {
            transform: scale(0.97);
            background: #161616;
        }

        .logout-btn {
            border-color: #ff3b30;
            color: #ff3b30;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Экран входа -->
        <div id="loginScreen" class="login-screen fade-in">
            <div class="login-card">
                <div class="logo">
                    <div class="logo-icon">RUSTY</div>
                    <div class="logo-text">PROJECT</div>
                    <div class="logo-sub">copypaste rusty</div>
                </div>
                <button class="btn btn-steam" id="steamLoginBtn">войти через steam</button>
                <button class="btn btn-telegram" id="telegramLoginBtn">войти через telegram</button>
            </div>
        </div>

        <!-- Главное меню -->
        <div id="mainMenu" class="main-menu fade-in">
            <!-- Вкладка ГЛАВНАЯ -->
            <div class="tab-content active" id="tab-home">
                <div class="balance-card">
                    <div class="balance-info">
                        <div class="balance-label">баланс</div>
                        <div class="balance-value" id="balanceValue">0</div>
                    </div>
                    <button class="topup-btn" id="topupBtn">пополнить stars</button>
                </div>

                <div class="action-card" id="downloadGameBtn">
                    <div class="action-text">
                        <div class="action-title">скачать игру</div>
                        <div class="action-subtitle">версия 1.0.2</div>
                    </div>
                    <div class="action-arrow">→</div>
                </div>

                <div class="action-card" id="creatorLink">
                    <div class="action-text">
                        <div class="action-title">создатель</div>
                        <div class="action-subtitle">@wasxr</div>
                    </div>
                    <div class="action-arrow">→</div>
                </div>

                <div class="action-card" id="communityLink">
                    <div class="action-text">
                        <div class="action-title">сообщество</div>
                        <div class="action-subtitle">rustyrust</div>
                    </div>
                    <div class="action-arrow">→</div>
                </div>
            </div>

            <!-- Вкладка АККАУНТ STEAM -->
            <div class="tab-content" id="tab-steam">
                <div class="card">
                    <div class="card-title">steam аккаунт</div>
                    <div class="info-row">
                        <span class="info-label">id</span>
                        <span class="info-value steam" id="steamId">не привязан</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">никнейм</span>
                        <span class="info-value" id="steamName">—</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">уровень</span>
                        <span class="info-value" id="steamLevel">—</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">страна</span>
                        <span class="info-value" id="steamCountry">—</span>
                    </div>
                    <button class="link-btn" id="linkSteamBtn">привязать steam</button>
                    <button class="link-btn disconnect-btn" id="unlinkSteamBtn" style="display: none;">отвязать steam</button>
                </div>
            </div>

            <!-- Вкладка АККАУНТ TELEGRAM -->
            <div class="tab-content" id="tab-telegram">
                <div class="card">
                    <div class="card-title">telegram аккаунт</div>
                    <div class="info-row">
                        <span class="info-label">id</span>
                        <span class="info-value telegram" id="tgId">не привязан</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">имя</span>
                        <span class="info-value" id="tgFirstName">—</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">фамилия</span>
                        <span class="info-value" id="tgLastName">—</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">username</span>
                        <span class="info-value" id="tgUsername">—</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">язык</span>
                        <span class="info-value" id="tgLanguage">—</span>
                    </div>
                    <button class="link-btn" id="linkTgBtn">привязать telegram</button>
                    <button class="link-btn disconnect-btn" id="unlinkTgBtn" style="display: none;">отвязать telegram</button>
                </div>
            </div>

            <!-- Нижняя навигация -->
            <div class="bottom-nav">
                <div class="nav-item active" data-tab="home">
                    <span>главная</span>
                </div>
                <div class="nav-item" data-tab="steam">
                    <span>steam</span>
                </div>
                <div class="nav-item" data-tab="telegram">
                    <span>telegram</span>
                </div>
                <div class="nav-item" id="logoutNavBtn">
                    <span>выйти</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ========== ХРАНИЛИЩЕ ==========
        let users = JSON.parse(localStorage.getItem("rusty_users")) || {};
        let currentUserId = localStorage.getItem("rusty_current_user") || null;

        // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
        function saveUsers() {
            localStorage.setItem("rusty_users", JSON.stringify(users));
        }

        function getCurrentUser() {
            if (currentUserId && users[currentUserId]) {
                return users[currentUserId];
            }
            return null;
        }

        function updateBalanceDisplay() {
            const user = getCurrentUser();
            if (user) {
                document.getElementById("balanceValue").textContent = user.balance || 0;
            }
        }

        function updateSteamTab() {
            const user = getCurrentUser();
            if (user && user.steam) {
                document.getElementById("steamId").textContent = user.steam.id || "—";
                document.getElementById("steamName").textContent = user.steam.name || "—";
                document.getElementById("steamLevel").textContent = user.steam.level || "—";
                document.getElementById("steamCountry").textContent = user.steam.country || "—";
                document.getElementById("linkSteamBtn").style.display = "none";
                document.getElementById("unlinkSteamBtn").style.display = "block";
            } else {
                document.getElementById("steamId").textContent = "не привязан";
                document.getElementById("steamName").textContent = "—";
                document.getElementById("steamLevel").textContent = "—";
                document.getElementById("steamCountry").textContent = "—";
                document.getElementById("linkSteamBtn").style.display = "block";
                document.getElementById("unlinkSteamBtn").style.display = "none";
            }
        }

        function updateTelegramTab() {
            const user = getCurrentUser();
            if (user && user.telegram) {
                document.getElementById("tgId").textContent = user.telegram.id || "—";
                document.getElementById("tgFirstName").textContent = user.telegram.first_name || "—";
                document.getElementById("tgLastName").textContent = user.telegram.last_name || "—";
                document.getElementById("tgUsername").textContent = user.telegram.username || "—";
                document.getElementById("tgLanguage").textContent = user.telegram.language_code || "—";
                document.getElementById("linkTgBtn").style.display = "none";
                document.getElementById("unlinkTgBtn").style.display = "block";
            } else {
                document.getElementById("tgId").textContent = "не привязан";
                document.getElementById("tgFirstName").textContent = "—";
                document.getElementById("tgLastName").textContent = "—";
                document.getElementById("tgUsername").textContent = "—";
                document.getElementById("tgLanguage").textContent = "—";
                document.getElementById("linkTgBtn").style.display = "block";
                document.getElementById("unlinkTgBtn").style.display = "none";
            }
        }

        function updateAllUI() {
            updateBalanceDisplay();
            updateSteamTab();
            updateTelegramTab();
        }

        // ========== ВХОД ЧЕРЕЗ STEAM (демо-имитация) ==========
        document.getElementById("steamLoginBtn").addEventListener("click", () => {
            // В реальном проекте здесь был бы редирект на Steam OpenID
            tg.showAlert("steam авторизация\n\nвведите данные для демо входа");
            
            const mockSteamId = prompt("steam id (76561198000000000)");
            const mockSteamName = prompt("никнейм в steam");
            
            if (mockSteamId && mockSteamName) {
                const userId = "steam_" + mockSteamId;
                if (!users[userId]) {
                    users[userId] = {
                        balance: 100,
                        steam: {
                            id: mockSteamId,
                            name: mockSteamName,
                            level: Math.floor(Math.random() * 50) + 1,
                            country: "ru"
                        },
                        telegram: null
                    };
                } else {
                    if (!users[userId].steam) {
                        users[userId].steam = {
                            id: mockSteamId,
                            name: mockSteamName,
                            level: Math.floor(Math.random() * 50) + 1,
                            country: "ru"
                        };
                    }
                }
                saveUsers();
                currentUserId = userId;
                localStorage.setItem("rusty_current_user", currentUserId);
                
                document.getElementById("loginScreen").style.display = "none";
                document.getElementById("mainMenu").style.display = "block";
                updateAllUI();
                tg.showAlert(`добро пожаловать, ${mockSteamName}`);
            }
        });

        // ========== ВХОД ЧЕРЕЗ TELEGRAM ==========
        document.getElementById("telegramLoginBtn").addEventListener("click", () => {
            const tgUser = tg.initDataUnsafe?.user;
            if (tgUser && tgUser.id) {
                const userId = "tg_" + tgUser.id;
                if (!users[userId]) {
                    users[userId] = {
                        balance: 100,
                        steam: null,
                        telegram: {
                            id: tgUser.id,
                            first_name: tgUser.first_name || "",
                            last_name: tgUser.last_name || "",
                            username: tgUser.username || "",
                            language_code: tgUser.language_code || "ru"
                        }
                    };
                } else {
                    if (!users[userId].telegram) {
                        users[userId].telegram = {
                            id: tgUser.id,
                            first_name: tgUser.first_name || "",
                            last_name: tgUser.last_name || "",
                            username: tgUser.username || "",
                            language_code: tgUser.language_code || "ru"
                        };
                    }
                }
                saveUsers();
                currentUserId = userId;
                localStorage.setItem("rusty_current_user", currentUserId);
                
                document.getElementById("loginScreen").style.display = "none";
                document.getElementById("mainMenu").style.display = "block";
                updateAllUI();
                tg.showAlert(`добро пожаловать, ${tgUser.first_name || "пользователь"}`);
            } else {
                tg.showAlert("ошибка: данные telegram не получены");
            }
        });

        // ========== ПРИВЯЗКА STEAM (из меню) ==========
        document.getElementById("linkSteamBtn").addEventListener("click", () => {
            const user = getCurrentUser();
            if (!user) return;
            
            const mockSteamId = prompt("steam id");
            const mockSteamName = prompt("никнейм в steam");
            
            if (mockSteamId && mockSteamName) {
                user.steam = {
                    id: mockSteamId,
                    name: mockSteamName,
                    level: Math.floor(Math.random() * 50) + 1,
                    country: "ru"
                };
                saveUsers();
                updateSteamTab();
                tg.showAlert("steam аккаунт привязан");
            }
        });

        document.getElementById("unlinkSteamBtn").addEventListener("click", () => {
            const user = getCurrentUser();
            if (user) {
                user.steam = null;
                saveUsers();
                updateSteamTab();
                tg.showAlert("steam аккаунт отвязан");
            }
        });

        // ========== ПРИВЯЗКА TELEGRAM ==========
        document.getElementById("linkTgBtn").addEventListener("click", () => {
            const tgUser = tg.initDataUnsafe?.user;
            const user = getCurrentUser();
            if (!user) return;
            
            if (tgUser && tgUser.id) {
                user.telegram = {
                    id: tgUser.id,
                    first_name: tgUser.first_name || "",
                    last_name: tgUser.last_name || "",
                    username: tgUser.username || "",
                    language_code: tgUser.language_code || "ru"
                };
                saveUsers();
                updateTelegramTab();
                tg.showAlert("telegram аккаунт привязан");
            } else {
                tg.showAlert("ошибка привязки");
            }
        });

        document.getElementById("unlinkTgBtn").addEventListener("click", () => {
            const user = getCurrentUser();
            if (user) {
                user.telegram = null;
                saveUsers();
                updateTelegramTab();
                tg.showAlert("telegram аккаунт отвязан");
            }
        });

        // ========== ВЫХОД ==========
        function logout() {
            currentUserId = null;
            localStorage.removeItem("rusty_current_user");
            document.getElementById("loginScreen").style.display = "flex";
            document.getElementById("mainMenu").style.display = "none";
            tg.showAlert("вы вышли из аккаунта");
        }

        document.getElementById("logoutNavBtn").addEventListener("click", logout);

        // ========== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ==========
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.getElementById(`tab-${tabId}`).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelector(`.nav-item[data-tab="${tabId}"]`).classList.add('active');
        }

        document.querySelectorAll('.nav-item[data-tab]').forEach(item => {
            item.addEventListener('click', () => switchTab(item.dataset.tab));
        });

        // ========== ОСТАЛЬНЫЕ ФУНКЦИИ ==========
        document.getElementById("topupBtn").addEventListener("click", () => {
            tg.sendData(JSON.stringify({ action: "topup", user_id: currentUserId }));
            tg.showAlert("пополнение баланса\n\nпереведите telegram stars на @wasxr\nукажите ваш id: " + currentUserId);
        });

        document.getElementById("downloadGameBtn").addEventListener("click", () => {
            tg.showAlert("скачивание начнется через браузер");
            window.open("https://example.com/download/rusty_project.zip", "_blank");
        });

        document.getElementById("creatorLink").addEventListener("click", () => {
            window.open("https://t.me/wasxr", "_blank");
        });

        document.getElementById("communityLink").addEventListener("click", () => {
            window.open("https://t.me/rustyrust", "_blank");
        });

        // ========== ПРОВЕРКА АВТОРИЗАЦИИ ПРИ ЗАГРУЗКЕ ==========
        if (currentUserId && users[currentUserId]) {
            document.getElementById("loginScreen").style.display = "none";
            document.getElementById("mainMenu").style.display = "block";
            updateAllUI();
        } else {
            document.getElementById("loginScreen").style.display = "flex";
            document.getElementById("mainMenu").style.display = "none";
        }
    </script>
</body>
</html>
