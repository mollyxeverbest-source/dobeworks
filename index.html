<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>CS2 Market | Dobeworks</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', Helvetica, Arial, sans-serif;
            background: #0a1a2e;
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px 16px 30px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }

        /* Экран входа */
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: #0d2a3e;
            border-radius: 24px;
            padding: 32px 24px;
            border: 1px solid #1e4d6f;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 32px;
            font-weight: 700;
            color: #2eccfa;
            letter-spacing: 2px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 600;
            color: #2eccfa;
            margin-top: 8px;
        }

        .logo-sub {
            font-size: 12px;
            color: #6c8ea0;
            margin-top: 4px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            background: #0a1a2e;
            border: 1px solid #1e4d6f;
            border-radius: 12px;
            font-size: 16px;
            color: #e0e0e0;
            font-family: inherit;
        }

        .input-field:focus {
            outline: none;
            border-color: #2eccfa;
        }

        .input-field::placeholder {
            color: #4a6a7a;
        }

        .btn {
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }

        .btn-primary {
            background: #2eccfa;
            color: #0a1a2e;
        }

        .btn-primary:active {
            background: #1a9fd0;
            transform: scale(0.98);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid #2eccfa;
            color: #2eccfa;
        }

        /* Главное меню */
        .main-menu {
            display: none;
        }

        /* Нижняя навигация */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 400px;
            margin: 0 auto;
            background: #0d2a3e;
            display: flex;
            justify-content: space-around;
            padding: 12px 20px;
            border-top: 1px solid #1e4d6f;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: #6c8ea0;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-item.active {
            color: #2eccfa;
        }

        /* Контент вкладок */
        .tab-content {
            display: none;
            padding-bottom: 80px;
        }

        .tab-content.active {
            display: block;
        }

        /* Карточки */
        .card {
            background: #0d2a3e;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid #1e4d6f;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: #2eccfa;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        .balance-card {
            background: #0d2a3e;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #1e4d6f;
        }

        .balance-label {
            font-size: 13px;
            color: #6c8ea0;
        }

        .balance-value {
            font-size: 32px;
            font-weight: 700;
            color: #2eccfa;
        }

        .topup-btn {
            background: #2eccfa;
            border: none;
            border-radius: 30px;
            padding: 10px 20px;
            font-weight: 600;
            color: #0a1a2e;
            cursor: pointer;
            font-size: 14px;
        }

        /* Фильтры */
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: #0a1a2e;
            border: 1px solid #1e4d6f;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 13px;
            color: #6c8ea0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: #2eccfa;
            border-color: #2eccfa;
            color: #0a1a2e;
        }

        /* Список скинов */
        .skin-item {
            background: #0d2a3e;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #1e4d6f;
            cursor: pointer;
            transition: all 0.2s;
        }

        .skin-item:active {
            transform: scale(0.98);
            background: #123a52;
        }

        .skin-icon {
            width: 56px;
            height: 56px;
            background: #0a1a2e;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .skin-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .skin-info {
            flex: 1;
        }

        .skin-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .skin-rarity {
            font-size: 11px;
            text-transform: uppercase;
        }

        .rarity-industrial { color: #5e7c9c; }
        .rarity-milspec { color: #4b69ff; }
        .rarity-restricted { color: #8847ff; }
        .rarity-classified { color: #d32ee6; }
        .rarity-covert { color: #eb4b4b; }
        .rarity-base { color: #6c8ea0; }

        .skin-price {
            font-size: 16px;
            font-weight: 700;
            color: #2eccfa;
        }

        /* Инвентарь */
        .inventory-item {
            background: #0d2a3e;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #1e4d6f;
        }

        .inventory-icon {
            width: 48px;
            height: 48px;
            background: #0a1a2e;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .inventory-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .inventory-info {
            flex: 1;
        }

        .inventory-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .inventory-date {
            font-size: 10px;
            color: #6c8ea0;
        }

        /* Профиль */
        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #0d2a3e;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #1e4d6f;
        }

        .profile-icon {
            width: 80px;
            height: 80px;
            background: #0a1a2e;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            border: 2px solid #2eccfa;
        }

        .profile-icon span {
            font-size: 36px;
            font-weight: 600;
            color: #2eccfa;
        }

        .profile-name {
            font-size: 20px;
            font-weight: 600;
            color: #ffffff;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #1e4d6f;
        }

        .info-label {
            color: #6c8ea0;
            font-size: 14px;
        }

        .info-value {
            font-weight: 500;
            font-size: 14px;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #ff5e5e;
            color: #ff5e5e;
            border-radius: 30px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 16px;
        }

        .trade-input {
            width: 100%;
            padding: 12px;
            background: #0a1a2e;
            border: 1px solid #1e4d6f;
            border-radius: 12px;
            color: #e0e0e0;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Экран входа -->
        <div id="loginScreen" class="login-screen fade-in">
            <div class="login-card">
                <div class="logo">
                    <div class="logo-icon">CS2 MARKET</div>
                    <div class="logo-text">DOBEWORKS</div>
                    <div class="logo-sub">skins marketplace</div>
                </div>
                <div class="input-group">
                    <input type="text" id="loginUsername" class="input-field" placeholder="login">
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" class="input-field" placeholder="password">
                </div>
                <button class="btn btn-primary" id="loginBtn">sign in</button>
                <button class="btn btn-secondary" id="registerBtn">sign up</button>
                <button class="btn btn-secondary" id="telegramAuthBtn" style="margin-top: 8px;">telegram login</button>
            </div>
        </div>

        <!-- Главное меню -->
        <div id="mainMenu" class="main-menu fade-in">
            <!-- Вкладка МАРКЕТ -->
            <div class="tab-content active" id="tab-market">
                <div class="balance-card">
                    <div class="balance-info">
                        <div class="balance-label">balance</div>
                        <div class="balance-value" id="balanceValue">0</div>
                    </div>
                    <button class="topup-btn" id="topupBtn">add stars</button>
                </div>

                <div class="filters">
                    <button class="filter-btn active" data-rarity="all">all</button>
                    <button class="filter-btn" data-rarity="industrial">industrial</button>
                    <button class="filter-btn" data-rarity="milspec">milspec</button>
                    <button class="filter-btn" data-rarity="restricted">restricted</button>
                    <button class="filter-btn" data-rarity="classified">classified</button>
                    <button class="filter-btn" data-rarity="covert">covert</button>
                </div>

                <div id="skinsList"></div>
            </div>

            <!-- Вкладка ИНВЕНТАРЬ -->
            <div class="tab-content" id="tab-inventory">
                <div class="card">
                    <div class="card-title">my skins</div>
                    <div id="inventoryList"></div>
                </div>
            </div>

            <!-- Вкладка ПРОФИЛЬ -->
            <div class="tab-content" id="tab-profile">
                <div class="profile-header">
                    <div class="profile-icon">
                        <span id="profileInitial">U</span>
                    </div>
                    <div class="profile-name" id="profileUsername">user</div>
                </div>

                <div class="card">
                    <div class="card-title">statistics</div>
                    <div class="info-row">
                        <span class="info-label">total spent</span>
                        <span class="info-value" id="totalSpent">0 stars</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">items owned</span>
                        <span class="info-value" id="itemsOwned">0</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">member since</span>
                        <span class="info-value" id="memberSince">—</span>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">steam trade link</div>
                    <input type="text" id="tradeLinkInput" class="trade-input" placeholder="https://steamcommunity.com/tradeoffer/...">
                    <button class="btn btn-secondary" id="saveTradeLinkBtn">save</button>
                </div>

                <button class="logout-btn" id="logoutBtn">logout</button>
            </div>

            <!-- Нижняя навигация -->
            <div class="bottom-nav">
                <div class="nav-item active" data-tab="market">market</div>
                <div class="nav-item" data-tab="inventory">inventory</div>
                <div class="nav-item" data-tab="profile">profile</div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ========== БАЗА ДАННЫХ ==========
        let users = JSON.parse(localStorage.getItem("cs2_users")) || {};
        let currentUser = localStorage.getItem("cs2_current_user") || null;
        let currentRarityFilter = "all";

        // ========== СКИНЫ С РЕАЛЬНЫМИ КАРТИНКАМИ STEAM CDN ==========
        const skinsCatalog = [
            { name: "AK-47 | Redline", rarity: "classified", price: 450, iconUrl: "https://steamcommunity-a.akamaihd.net/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot7HxfDhjxszJYz1H4-G3koG0hPz2N7LEgn8u7MxkhbmRr4z2jQ2xrxYtZ2r6ddOXIQRrZA-G8wO8x-bv1Ja47cvJynXo-9Wln3VvsQ" },

            { name: "M4A4 | Howl", rarity: "covert", price: 3200, iconUrl: "https://steamcommunity-a.akamaihd.net/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpou-6kejhz0v_fdz9V09mKmYy0m_LwNbrQkWRY781n2u6Sp9iljVbl_BU-Yzr0cI7FJAM4Yl6G8wXtkLu70Mbpu8ycni48MXVt" },
            { name: "USP-S | Kill Confirmed", rarity: "classified", price: 280, iconUrl: "https://steamcommunity-a.akamaihd.net/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpoko26tCBw0_bYcThD6d6xq5OYqPHDPr7Vn2VU7cB4lLuR9I3w0Qzl-hZsZGn6doeeJlE9Yl-F-wW5xLrt0pS66Z2ewCQ27g" },
            { name: "Desert Eagle | Blaze", rarity: "restricted", price: 150, iconUrl: "https://steamcommunity-a.akamaihd.net/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgposbaqKAxf0v73dTxD6d6xq5OYqPHDPr7Vn2VU7cB4lLuR9I3w0Qzl-hZsZGn6doeeJlE9Yl-F-wW5xLrt0pS66Z2ewCQ27g" },
            { name: "AK-47 | Bloodsport", rarity: "classified", price: 380, iconUrl: "https://steamcommunity-a.akamaihd.net/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpou7uifDhzwc3acitR09K5lZm0nvL4NbrQkWRY781n2u6Sp9iljVbl_BU-Yzr0cI7FJAM4Yl6G8wXtkLu70Mbpu8yZnSg1ujIuuw" },
            { name: "M4A1-S | Printstream", rarity: "covert", price: 800, iconUrl: "https://steamcommunity-a.akamaihd.net/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpou-6kejhz2v_Nfz5H6-K3m5S0n_rLPoPck2NpgIhz2-2QoI2hjwGyr0NsYDr7dNLEJgI2ZAyE_AO_w-a9gMTquZSbyi5osiF9wA" },
            { name: "AWP | Asiimov", rarity: "classified", price: 520, iconUrl: "https://steamcommunity-a.akamaihd.net/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot621FA957fPLQwJM9d23h5O0m_7zOq_um2pD7Mkgi7yS9IjxjwW3_EdoYz3zdoKQJAdrMl6G8wXst7zv0pO56MnNnHtkM7A" },
            { name: "SSG 08 | Death Strike", rarity: "milspec", price: 45, iconUrl: "https://steamcommunity-a.akamaihd.net/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpou6ryFA957PvQaTJY09SzlZaS2aX3MOvSlzlQucdy2LqU9NmnjAzl_UJoYmqldYSTIQI_NV_X81bvkufxxcjryPo2vmI" },
            { name: "P90 | Asiimov", rarity: "restricted", price: 85, iconUrl: "https://steamcommunity-a.akamaihd.net/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot621FA957fPLQwJM9d23h5O0m_7zOq_um2pD7Mkgi7yS9IjxjwW3_EdoYz3zdoKQJAdrMl6G8wXst7zv0pO56MnNnHtkM7A" },
            { name: "Glock-18 | Water Elemental", rarity: "milspec", price: 55, iconUrl: "https://steamcommunity-a.akamaihd.net/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgposbaqKAxf0v73dTxD6d6xq5OYqPHDPr7Vn2VU7cB4lLuR9I3w0Qzl-hZsZGn6doeeJlE9Yl-F-wW5xLrt0pS66Z2ewCQ27g" },
            { name: "MAG-7 | Heat", rarity: "industrial", price: 20, iconUrl: "https://steamcommunity-a.akamaihd.net/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpou7uifDhzwc3acitR09K5lZm0nvL4NbrQkWRY781n2u6Sp9iljVbl_BU-Yzr0cI7FJAM4Yl6G8wXtkLu70Mbpu8yZnSg1ujIuuw" }
        ];

        // ========== ФУНКЦИИ ==========
        function saveUsers() {
            localStorage.setItem("cs2_users", JSON.stringify(users));
        }

        function getCurrentUserData() {
            if (currentUser && users[currentUser]) return users[currentUser];
            return null;
        }

        function getRarityClass(rarity) {
            switch(rarity) {
                case "industrial": return "rarity-industrial";
                case "milspec": return "rarity-milspec";
                case "restricted": return "rarity-restricted";
                case "classified": return "rarity-classified";
                case "covert": return "rarity-covert";
                default: return "rarity-base";
            }
        }

        function updateBalance() {
            const user = getCurrentUserData();
            if (user) {
                document.getElementById("balanceValue").textContent = user.balance || 0;
            }
        }

        function updateProfile() {
            const user = getCurrentUserData();
            if (user) {
                document.getElementById("profileInitial").textContent = user.username.charAt(0).toUpperCase();
                document.getElementById("profileUsername").textContent = user.username;
                document.getElementById("totalSpent").textContent = (user.totalSpent || 0) + " stars";
                document.getElementById("itemsOwned").textContent = (user.inventory?.length || 0);
                document.getElementById("memberSince").textContent = user.joinDate || "2024";
                document.getElementById("tradeLinkInput").value = user.tradeLink || "";
            }
        }

        function updateInventory() {
            const user = getCurrentUserData();
            const inventoryList = document.getElementById("inventoryList");
            if (!user || !user.inventory || user.inventory.length === 0) {
                inventoryList.innerHTML = '<div style="text-align: center; color: #6c8ea0; padding: 40px;">no skins yet</div>';
                return;
            }
            inventoryList.innerHTML = user.inventory.map((item, idx) => `
                <div class="inventory-item">
                    <div class="inventory-icon">
                        <img src="${item.iconUrl}" onerror="this.src='https://steamcommunity-a.akamaihd.net/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpou6ryFA957PvQaTJY09SzlZaS2aX3MOvSlzlQucdy2LqU9NmnjAzl_UJoYmqldYSTIQI_NV_X81bvkufxxcjryPo2vmI'">
                    </div>
                    <div class="inventory-info">
                        <div class="inventory-name">${item.name}</div>
                        <div class="inventory-date">${item.date || "purchased"}</div>
                    </div>
                    <div class="skin-price">${item.price} stars</div>
                </div>
            `).join('');
        }

        function renderMarket() {
            const filtered = currentRarityFilter === "all" 
                ? skinsCatalog 
                : skinsCatalog.filter(s => s.rarity === currentRarityFilter);
            
            const skinsList = document.getElementById("skinsList");
            skinsList.innerHTML = filtered.map(skin => `
                <div class="skin-item" data-name="${skin.name}" data-price="${skin.price}" data-iconurl="${skin.iconUrl}" data-rarity="${skin.rarity}">
                    <div class="skin-icon">
                        <img src="${skin.iconUrl}" onerror="this.src='https://steamcommunity-a.akamaihd.net/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpou6ryFA957PvQaTJY09SzlZaS2aX3MOvSlzlQucdy2LqU9NmnjAzl_UJoYmqldYSTIQI_NV_X81bvkufxxcjryPo2vmI'">
                    </div>
                    <div class="skin-info">
                        <div class="skin-name">${skin.name}</div>
                        <div class="skin-rarity ${getRarityClass(skin.rarity)}">${skin.rarity}</div>
                    </div>
                    <div class="skin-price">${skin.price} stars</div>
                </div>
            `).join('');
            
            document.querySelectorAll('.skin-item').forEach(el => {
                el.addEventListener('click', () => {
                    const name = el.dataset.name;
                    const price = parseInt(el.dataset.price);
                    const iconUrl = el.dataset.iconurl;
                    const rarity = el.dataset.rarity;
                    buySkin(name, price, iconUrl, rarity);
                });
            });
        }

        function buySkin(name, price, iconUrl, rarity) {
            const user = getCurrentUserData();
            if (!user) return;
            
            if (user.balance >= price) {
                user.balance -= price;
                user.totalSpent = (user.totalSpent || 0) + price;
                if (!user.inventory) user.inventory = [];
                user.inventory.push({
                    name: name,
                    price: price,
                    iconUrl: iconUrl,
                    rarity: rarity,
                    date: new Date().toLocaleDateString()
                });
                saveUsers();
                updateBalance();
                updateInventory();
                updateProfile();
                tg.showAlert(`purchased ${name} for ${price} stars`);
                tg.sendData(JSON.stringify({ action: "purchase", skin: name, price: price }));
            } else {
                tg.showAlert(`not enough stars! need ${price}, you have ${user.balance}`);
            }
        }

        // ========== АВТОРИЗАЦИЯ ==========
        document.getElementById("loginBtn").addEventListener("click", () => {
            const username = document.getElementById("loginUsername").value.trim();
            const password = document.getElementById("loginPassword").value.trim();
            if (!username || !password) {
                tg.showAlert("enter login and password");
                return;
            }
            if (users[username] && users[username].password === password) {
                currentUser = username;
                localStorage.setItem("cs2_current_user", currentUser);
                document.getElementById("loginScreen").style.display = "none";
                document.getElementById("mainMenu").style.display = "block";
                updateBalance();
                updateInventory();
                updateProfile();
                tg.showAlert(`welcome back, ${username}`);
            } else {
                tg.showAlert("invalid login or password");
            }
        });

        document.getElementById("registerBtn").addEventListener("click", () => {
            const username = document.getElementById("loginUsername").value.trim();
            const password = document.getElementById("loginPassword").value.trim();
            if (!username || !password) {
                tg.showAlert("enter login and password");
                return;
            }
            if (users[username]) {
                tg.showAlert("user already exists");
                return;
            }
            users[username] = {
                password: password,
                balance: 200,
                totalSpent: 0,
                inventory: [],
                joinDate: new Date().toLocaleDateString(),
                tradeLink: ""
            };
            saveUsers();
            currentUser = username;
            localStorage.setItem("cs2_current_user", currentUser);
            document.getElementById("loginScreen").style.display = "none";
            document.getElementById("mainMenu").style.display = "block";
            updateBalance();
            updateInventory();
            updateProfile();
            tg.showAlert(`welcome ${username}! +200 stars bonus`);
        });

        document.getElementById("telegramAuthBtn").addEventListener("click", () => {
            const tgUser = tg.initDataUnsafe?.user;
            if (tgUser && tgUser.id) {
                const username = "tg_" + tgUser.id;
                if (!users[username]) {
                    users[username] = {
                        password: "telegram_auth",
                        balance: 200,
                        totalSpent: 0,
                        inventory: [],
                        joinDate: new Date().toLocaleDateString(),
                        tradeLink: "",
                        tgName: tgUser.first_name
                    };
                    saveUsers();
                }
                currentUser = username;
                localStorage.setItem("cs2_current_user", currentUser);
                document.getElementById("loginScreen").style.display = "none";
                document.getElementById("mainMenu").style.display = "block";
                updateBalance();
                updateInventory();
                updateProfile();
                tg.showAlert(`welcome ${tgUser.first_name || "user"}!`);
            } else {
                tg.showAlert("telegram data not available");
            }
        });

        document.getElementById("topupBtn").addEventListener("click", () => {
            tg.sendData(JSON.stringify({ action: "topup", user: currentUser }));
            tg.showAlert(`add stars\n\nsend telegram stars to @wasxr\nuser id: ${currentUser}`);
        });

        document.getElementById("saveTradeLinkBtn").addEventListener("click", () => {
            const user = getCurrentUserData();
            if (user) {
                const link = document.getElementById("tradeLinkInput").value;
                user.tradeLink = link;
                saveUsers();
                tg.showAlert("trade link saved");
            }
        });

        document.getElementById("logoutBtn").addEventListener("click", () => {
            currentUser = null;
            localStorage.removeItem("cs2_current_user");
            document.getElementById("loginScreen").style.display = "flex";
            document.getElementById("mainMenu").style.display = "none");
            document.getElementById("loginUsername").value = "";
            document.getElementById("loginPassword").value = "";
            tg.showAlert("logged out");
        });

        // Фильтрация
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentRarityFilter = btn.dataset.rarity;
                renderMarket();
            });
        });

        // Переключение вкладок
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.querySelector(`.nav-item[data-tab="${tabId}"]`).classList.add('active');
            if (tabId === 'inventory') updateInventory();
            if (tabId === 'profile') updateProfile();
        }

        document.querySelectorAll('.nav-item[data-tab]').forEach(item => {
            item.addEventListener('click', () => switchTab(item.dataset.tab));
        });

        // Проверка авторизации при загрузке (сохранение работает!)
        if (currentUser && users[currentUser]) {
            document.getElementById("loginScreen").style.display = "none";
            document.getElementById("mainMenu").style.display = "block";
            updateBalance();
            updateInventory();
            updateProfile();
            renderMarket();
        }
    </script>
</body>
</html>
