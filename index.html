<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>CS2 Market | Dobeworks</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px 16px 30px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }

        /* Экран входа */
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: #111111;
            border-radius: 24px;
            padding: 32px 24px;
            border: 1px solid #222222;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 32px;
            font-weight: 700;
            color: #d4af37;
            letter-spacing: 2px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 600;
            color: #d4af37;
            margin-top: 8px;
        }

        .logo-sub {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            font-size: 16px;
            color: #e0e0e0;
            font-family: inherit;
        }

        .input-field:focus {
            outline: none;
            border-color: #d4af37;
        }

        .input-field::placeholder {
            color: #555;
        }

        .btn {
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }

        .btn-primary {
            background: #d4af37;
            color: #0a0a0a;
        }

        .btn-primary:active {
            background: #c4a030;
            transform: scale(0.98);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid #d4af37;
            color: #d4af37;
        }

        /* Главное меню */
        .main-menu {
            display: none;
        }

        /* Нижняя навигация */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 400px;
            margin: 0 auto;
            background: #111111;
            display: flex;
            justify-content: space-around;
            padding: 12px 20px;
            border-top: 1px solid #222;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: #666;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-item.active {
            color: #d4af37;
        }

        /* Контент вкладок */
        .tab-content {
            display: none;
            padding-bottom: 80px;
        }

        .tab-content.active {
            display: block;
        }

        /* Карточки */
        .card {
            background: #111111;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid #222;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: #d4af37;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        .balance-card {
            background: #111111;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #222;
        }

        .balance-label {
            font-size: 13px;
            color: #666;
        }

        .balance-value {
            font-size: 32px;
            font-weight: 700;
            color: #d4af37;
        }

        .topup-btn {
            background: #d4af37;
            border: none;
            border-radius: 30px;
            padding: 10px 20px;
            font-weight: 600;
            color: #0a0a0a;
            cursor: pointer;
            font-size: 14px;
        }

        /* Фильтры */
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 13px;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: #d4af37;
            border-color: #d4af37;
            color: #0a0a0a;
        }

        /* Список скинов */
        .skin-item {
            background: #111111;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 14px;
            border: 1px solid #222;
            cursor: pointer;
            transition: all 0.2s;
        }

        .skin-item:active {
            transform: scale(0.98);
            background: #161616;
        }

        .skin-icon {
            width: 56px;
            height: 56px;
            background: #1a1a1a;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 20px;
            color: #d4af37;
        }

        .skin-info {
            flex: 1;
        }

        .skin-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .skin-rarity {
            font-size: 12px;
            margin-bottom: 4px;
        }

        .rarity-industrial {
            color: #5e7c9c;
        }
        .rarity-milspec {
            color: #4b69ff;
        }
        .rarity-restricted {
            color: #8847ff;
        }
        .rarity-classified {
            color: #d32ee6;
        }
        .rarity-covert {
            color: #eb4b4b;
        }

        .skin-price {
            font-size: 18px;
            font-weight: 700;
            color: #d4af37;
        }

        .price-change {
            font-size: 11px;
            margin-left: 8px;
        }
        .price-up { color: #4caf50; }
        .price-down { color: #ff3b30; }

        /* Инвентарь */
        .inventory-item {
            background: #111111;
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #222;
        }

        .inventory-icon {
            width: 48px;
            height: 48px;
            background: #1a1a1a;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            color: #d4af37;
        }

        .inventory-info {
            flex: 1;
        }

        .inventory-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .inventory-date {
            font-size: 10px;
            color: #555;
        }

        /* Ежедневный бонус */
        .bonus-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #d4af37;
        }

        .bonus-info {
            display: flex;
            flex-direction: column;
        }

        .bonus-label {
            font-size: 12px;
            color: #d4af37;
        }

        .bonus-value {
            font-size: 20px;
            font-weight: 700;
            color: #d4af37;
        }

        .bonus-btn {
            background: #d4af37;
            border: none;
            border-radius: 30px;
            padding: 8px 16px;
            font-weight: 600;
            color: #0a0a0a;
            cursor: pointer;
            font-size: 13px;
        }

        .bonus-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #222;
            font-size: 14px;
        }

        .info-label {
            color: #666;
        }

        .info-value {
            font-weight: 500;
        }

        .price-graph {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 60px;
            margin: 16px 0;
        }

        .graph-bar {
            flex: 1;
            background: #d4af37;
            border-radius: 2px;
            min-height: 4px;
            opacity: 0.6;
        }

        .graph-bar.high {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Экран входа -->
        <div id="loginScreen" class="login-screen fade-in">
            <div class="login-card">
                <div class="logo">
                    <div class="logo-icon">CS2 MARKET</div>
                    <div class="logo-text">DOBEWORKS</div>
                    <div class="logo-sub">skins marketplace</div>
                </div>
                <div class="input-group">
                    <input type="text" id="loginUsername" class="input-field" placeholder="login">
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" class="input-field" placeholder="password">
                </div>
                <button class="btn btn-primary" id="loginBtn">sign in</button>
                <button class="btn btn-secondary" id="registerBtn">sign up</button>
                <button class="btn btn-secondary" id="telegramAuthBtn" style="margin-top: 8px;">telegram login</button>
            </div>
        </div>

        <!-- Главное меню -->
        <div id="mainMenu" class="main-menu fade-in">
            <!-- Вкладка МАРКЕТ -->
            <div class="tab-content active" id="tab-market">
                <div class="balance-card">
                    <div class="balance-info">
                        <div class="balance-label">balance</div>
                        <div class="balance-value" id="balanceValue">0</div>
                    </div>
                    <button class="topup-btn" id="topupBtn">add stars</button>
                </div>

                <div class="bonus-card" id="bonusCard">
                    <div class="bonus-info">
                        <div class="bonus-label">daily bonus</div>
                        <div class="bonus-value" id="bonusValue">+50 stars</div>
                    </div>
                    <button class="bonus-btn" id="claimBonusBtn">claim</button>
                </div>

                <div class="filters">
                    <button class="filter-btn active" data-rarity="all">all</button>
                    <button class="filter-btn" data-rarity="industrial">industrial</button>
                    <button class="filter-btn" data-rarity="milspec">milspec</button>
                    <button class="filter-btn" data-rarity="restricted">restricted</button>
                    <button class="filter-btn" data-rarity="classified">classified</button>
                    <button class="filter-btn" data-rarity="covert">covert</button>
                </div>

                <div id="skinsList"></div>
            </div>

            <!-- Вкладка ИНВЕНТАРЬ -->
            <div class="tab-content" id="tab-inventory">
                <div class="card">
                    <div class="card-title">my skins</div>
                    <div id="inventoryList"></div>
                </div>
            </div>

            <!-- Вкладка ПРОФИЛЬ -->
            <div class="tab-content" id="tab-profile">
                <div class="card">
                    <div class="card-title">profile info</div>
                    <div class="info-row">
                        <span class="info-label">username</span>
                        <span class="info-value" id="profileUsername">—</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">total spent</span>
                        <span class="info-value" id="totalSpent">0 stars</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">items owned</span>
                        <span class="info-value" id="itemsOwned">0</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">member since</span>
                        <span class="info-value" id="memberSince">—</span>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">steam trade link</div>
                    <input type="text" id="tradeLinkInput" class="input-field" placeholder="https://steamcommunity.com/tradeoffer/...">
                    <button class="btn btn-secondary" id="saveTradeLinkBtn" style="margin-top: 12px;">save</button>
                </div>

                <div class="card">
                    <div class="card-title">statistics</div>
                    <div id="priceGraph" class="price-graph"></div>
                    <div class="info-row">
                        <span class="info-label">market volume</span>
                        <span class="info-value" id="marketVolume">0</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">avg price</span>
                        <span class="info-value" id="avgPrice">0</span>
                    </div>
                </div>
            </div>

            <!-- Нижняя навигация -->
            <div class="bottom-nav">
                <div class="nav-item active" data-tab="market">market</div>
                <div class="nav-item" data-tab="inventory">inventory</div>
                <div class="nav-item" data-tab="profile">profile</div>
                <div class="nav-item" id="logoutNavBtn">logout</div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ========== ДАННЫЕ ==========
        let users = JSON.parse(localStorage.getItem("cs2_users")) || {};
        let currentUser = localStorage.getItem("cs2_current_user") || null;
        let currentRarityFilter = "all";

        // Список скинов с редкостями
        const skinsCatalog = [
            { name: "AK-47 | Redline", rarity: "classified", price: 450, icon: "AK", priceHistory: [420, 430, 445, 450, 455] },
            { name: "AWP | Dragon Lore", rarity: "covert", price: 5000, icon: "AW", priceHistory: [4800, 4900, 4950, 5000, 5100] },
            { name: "M4A4 | Howl", rarity: "covert", price: 3200, icon: "M4", priceHistory: [3000, 3100, 3150, 3200, 3250] },
            { name: "USP-S | Kill Confirmed", rarity: "classified", price: 280, icon: "US", priceHistory: [250, 260, 270, 280, 290] },
            { name: "Desert Eagle | Blaze", rarity: "restricted", price: 150, icon: "DE", priceHistory: [140, 145, 148, 150, 155] },
            { name: "AK-47 | Bloodsport", rarity: "classified", price: 380, icon: "AK", priceHistory: [350, 360, 370, 380, 390] },
            { name: "M4A1-S | Printstream", rarity: "covert", price: 800, icon: "M4", priceHistory: [750, 770, 790, 800, 820] },
            { name: "AWP | Asiimov", rarity: "classified", price: 520, icon: "AW", priceHistory: [500, 510, 515, 520, 530] },
            { name: "SSG 08 | Death Strike", rarity: "milspec", price: 45, icon: "SS", priceHistory: [40, 42, 44, 45, 47] },
            { name: "P90 | Asiimov", rarity: "restricted", price: 85, icon: "P9", priceHistory: [75, 80, 82, 85, 88] },
            { name: "Glock-18 | Water Elemental", rarity: "milspec", price: 55, icon: "GL", priceHistory: [50, 52, 54, 55, 58] },
            { name: "MAG-7 | Heat", rarity: "industrial", price: 20, icon: "MG", priceHistory: [18, 19, 20, 20, 22] }
        ];

        // ========== ФУНКЦИИ ==========
        function saveUsers() {
            localStorage.setItem("cs2_users", JSON.stringify(users));
        }

        function getCurrentUserData() {
            if (currentUser && users[currentUser]) return users[currentUser];
            return null;
        }

        function updateBalance() {
            const user = getCurrentUserData();
            if (user) {
                document.getElementById("balanceValue").textContent = user.balance || 0;
            }
        }

        function updateProfile() {
            const user = getCurrentUserData();
            if (user) {
                document.getElementById("profileUsername").textContent = user.username;
                document.getElementById("totalSpent").textContent = (user.totalSpent || 0) + " stars";
                document.getElementById("itemsOwned").textContent = (user.inventory?.length || 0);
                document.getElementById("memberSince").textContent = user.joinDate || "2024";
                document.getElementById("tradeLinkInput").value = user.tradeLink || "";
                
                // Рыночная статистика
                const ownedItems = user.inventory || [];
                const totalValue = ownedItems.reduce((sum, item) => sum + item.price, 0);
                document.getElementById("marketVolume").textContent = totalValue + " stars";
                
                if (ownedItems.length > 0) {
                    const avg = Math.round(totalValue / ownedItems.length);
                    document.getElementById("avgPrice").textContent = avg + " stars";
                } else {
                    document.getElementById("avgPrice").textContent = "0 stars";
                }
                
                // График цен (последние 5 дней рынка)
                const graphContainer = document.getElementById("priceGraph");
                const maxPrice = Math.max(...skinsCatalog.map(s => s.price));
                graphContainer.innerHTML = skinsCatalog.slice(0, 8).map(skin => {
                    const height = Math.max(20, (skin.price / maxPrice) * 50);
                    return `<div class="graph-bar ${skin.price > 400 ? 'high' : ''}" style="height: ${height}px;"></div>`;
                }).join('');
            }
        }

        function updateInventory() {
            const user = getCurrentUserData();
            const inventoryList = document.getElementById("inventoryList");
            if (!user || !user.inventory || user.inventory.length === 0) {
                inventoryList.innerHTML = '<div style="text-align: center; color: #666; padding: 40px;">no skins yet</div>';
                return;
            }
            inventoryList.innerHTML = user.inventory.map((item, idx) => `
                <div class="inventory-item">
                    <div class="inventory-icon">${item.icon}</div>
                    <div class="inventory-info">
                        <div class="inventory-name">${item.name}</div>
                        <div class="inventory-date">${item.date || "purchased"}</div>
                    </div>
                    <div class="skin-price">${item.price}</div>
                </div>
            `).join('');
        }

        function renderMarket() {
            const filtered = currentRarityFilter === "all" 
                ? skinsCatalog 
                : skinsCatalog.filter(s => s.rarity === currentRarityFilter);
            
            const skinsList = document.getElementById("skinsList");
            skinsList.innerHTML = filtered.map(skin => {
                const priceHistory = skin.priceHistory || [skin.price];
                const change = priceHistory[priceHistory.length-1] - priceHistory[priceHistory.length-2];
                const changeClass = change >= 0 ? "price-up" : "price-down";
                const changeText = change >= 0 ? `+${change}` : `${change}`;
                
                let rarityClass = "";
                switch(skin.rarity) {
                    case "industrial": rarityClass = "rarity-industrial"; break;
                    case "milspec": rarityClass = "rarity-milspec"; break;
                    case "restricted": rarityClass = "rarity-restricted"; break;
                    case "classified": rarityClass = "rarity-classified"; break;
                    case "covert": rarityClass = "rarity-covert"; break;
                }
                
                return `
                    <div class="skin-item" data-name="${skin.name}" data-price="${skin.price}" data-icon="${skin.icon}" data-rarity="${skin.rarity}">
                        <div class="skin-icon">${skin.icon}</div>
                        <div class="skin-info">
                            <div class="skin-name">${skin.name}</div>
                            <div class="skin-rarity ${rarityClass}">${skin.rarity}</div>
                        </div>
                        <div>
                            <div class="skin-price">${skin.price} stars</div>
                            <div class="price-change ${changeClass}">${changeText}</div>
                        </div>
                    </div>
                `;
            }).join('');
            
            // Добавляем обработчики
            document.querySelectorAll('.skin-item').forEach(el => {
                el.addEventListener('click', () => {
                    const name = el.dataset.name;
                    const price = parseInt(el.dataset.price);
                    const icon = el.dataset.icon;
                    const rarity = el.dataset.rarity;
                    buySkin(name, price, icon, rarity);
                });
            });
        }

        function buySkin(name, price, icon, rarity) {
            const user = getCurrentUserData();
            if (!user) return;
            
            if (user.balance >= price) {
                user.balance -= price;
                user.totalSpent = (user.totalSpent || 0) + price;
                if (!user.inventory) user.inventory = [];
                user.inventory.push({
                    name: name,
                    price: price,
                    icon: icon,
                    rarity: rarity,
                    date: new Date().toLocaleDateString()
                });
                saveUsers();
                updateBalance();
                updateInventory();
                updateProfile();
                tg.showAlert(`purchased ${name} for ${price} stars`);
                tg.sendData(JSON.stringify({ action: "purchase", skin: name, price: price }));
            } else {
                tg.showAlert(`not enough stars! need ${price}, you have ${user.balance}`);
            }
        }

        // Ежедневный бонус
        function checkDailyBonus() {
            const user = getCurrentUserData();
            if (!user) return;
            
            const today = new Date().toDateString();
            const lastBonus = user.lastBonus;
            
            if (lastBonus !== today) {
                document.getElementById("claimBonusBtn").disabled = false;
                document.getElementById("claimBonusBtn").textContent = "claim";
            } else {
                document.getElementById("claimBonusBtn").disabled = true;
                document.getElementById("claimBonusBtn").textContent = "already claimed";
            }
        }

        document.getElementById("claimBonusBtn")?.addEventListener("click", () => {
            const user = getCurrentUserData();
            if (!user) return;
            
            const today = new Date().toDateString();
            if (user.lastBonus !== today) {
                user.balance = (user.balance || 0) + 50;
                user.lastBonus = today;
                saveUsers();
                updateBalance();
                tg.showAlert("you received 50 stars daily bonus!");
                document.getElementById("claimBonusBtn").disabled = true;
                document.getElementById("claimBonusBtn").textContent = "already claimed";
            }
        });

        // Фильтрация
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentRarityFilter = btn.dataset.rarity;
                renderMarket();
            });
        });

        // Сохранение трейд ссылки
        document.getElementById("saveTradeLinkBtn")?.addEventListener("click", () => {
            const user = getCurrentUserData();
            if (user) {
                const link = document.getElementById("tradeLinkInput").value;
                user.tradeLink = link;
                saveUsers();
                tg.showAlert("trade link saved");
            }
        });

        // ========== АВТОРИЗАЦИЯ ==========
        document.getElementById("loginBtn").addEventListener("click", () => {
            const username = document.getElementById("loginUsername").value.trim();
            const password = document.getElementById("loginPassword").value.trim();
            if (!username || !password) {
                tg.showAlert("enter login and password");
                return;
            }
            if (users[username] && users[username].password === password) {
                currentUser = username;
                localStorage.setItem("cs2_current_user", currentUser);
                document.getElementById("loginScreen").style.display = "none";
                document.getElementById("mainMenu").style.display = "block";
                updateBalance();
                updateInventory();
                updateProfile();
                checkDailyBonus();
                tg.showAlert(`welcome back, ${username}`);
            } else {
                tg.showAlert("invalid login or password");
            }
        });

        document.getElementById("registerBtn").addEventListener("click", () => {
            const username = document.getElementById("loginUsername").value.trim();
            const password = document.getElementById("loginPassword").value.trim();
            if (!username || !password) {
                tg.showAlert("enter login and password");
                return;
            }
            if (users[username]) {
                tg.showAlert("user already exists");
                return;
            }
            users[username] = {
                password: password,
                balance: 100,
                totalSpent: 0,
                inventory: [],
                joinDate: new Date().toLocaleDateString(),
                tradeLink: ""
            };
            saveUsers();
            currentUser = username;
            localStorage.setItem("cs2_current_user", currentUser);
            document.getElementById("loginScreen").style.display = "none";
            document.getElementById("mainMenu").style.display = "block";
            updateBalance();
            updateInventory();
            updateProfile();
            checkDailyBonus();
            tg.showAlert(`welcome ${username}! +100 stars bonus`);
        });

        document.getElementById("telegramAuthBtn").addEventListener("click", () => {
            const tgUser = tg.initDataUnsafe?.user;
            if (tgUser && tgUser.id) {
                const username = "tg_" + tgUser.id;
                if (!users[username]) {
                    users[username] = {
                        password: "telegram_auth",
                        balance: 100,
                        totalSpent: 0,
                        inventory: [],
                        joinDate: new Date().toLocaleDateString(),
                        tradeLink: "",
                        tgName: tgUser.first_name
                    };
                    saveUsers();
                }
                currentUser = username;
                localStorage.setItem("cs2_current_user", currentUser);
                document.getElementById("loginScreen").style.display = "none";
                document.getElementById("mainMenu").style.display = "block";
                updateBalance();
                updateInventory();
                updateProfile();
                checkDailyBonus();
                tg.showAlert(`welcome ${tgUser.first_name || "user"}!`);
            } else {
                tg.showAlert("telegram data not available");
            }
        });

        document.getElementById("topupBtn").addEventListener("click", () => {
            const user = getCurrentUserData();
            tg.sendData(JSON.stringify({ action: "topup", user: currentUser }));
            tg.showAlert(`add stars\n\nsend telegram stars to @wasxr\nuser id: ${currentUser}`);
        });

        document.getElementById("logoutNavBtn").addEventListener("click", () => {
            currentUser = null;
            localStorage.removeItem("cs2_current_user");
            document.getElementById("loginScreen").style.display = "flex";
            document.getElementById("mainMenu").style.display = "none";
            document.getElementById("loginUsername").value = "";
            document.getElementById("loginPassword").value = "";
            tg.showAlert("logged out");
        });

        // Переключение вкладок
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.querySelector(`.nav-item[data-tab="${tabId}"]`).classList.add('active');
            if (tabId === 'inventory') updateInventory();
            if (tabId === 'profile') updateProfile();
        }

        document.querySelectorAll('.nav-item[data-tab]').forEach(item => {
            item.addEventListener('click', () => switchTab(item.dataset.tab));
        });

        // Проверка авторизации при загрузке
        if (currentUser && users[currentUser]) {
            document.getElementById("loginScreen").style.display = "none";
            document.getElementById("mainMenu").style.display = "block";
            updateBalance();
            updateInventory();
            updateProfile();
            checkDailyBonus();
            renderMarket();
        }
    </script>
</body>
</html>
