<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Rusty Market | Dobeworks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', Helvetica, Arial, sans-serif;
            background: #f8f9fc;
            min-height: 100vh;
            color: #1c1c1e;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px 16px 80px;
        }

        /* ===== СВЕТЛАЯ ТЕМА ===== */
        .welcome-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #f8f9fc;
        }

        .welcome-card {
            text-align: center;
            width: 100%;
            padding: 32px 24px;
            border-radius: 48px;
            background: #ffffff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .welcome-greeting { font-size: 24px; font-weight: 600; margin-bottom: 8px; color: #1c1c1e; }
        .welcome-name { font-size: 20px; font-weight: 500; margin-bottom: 32px; color: #007aff; }

        .welcome-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #007aff 0%, #5856d6 100%);
            border-radius: 50px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .welcome-avatar span { font-size: 44px; font-weight: 500; color: white; }

        .welcome-btn {
            background: #007aff;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            color: white;
            width: 100%;
            cursor: pointer;
        }

        .balance-card {
            background: linear-gradient(135deg, #007aff 0%, #5856d6 100%);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        .balance-value { font-size: 28px; font-weight: 700; display: flex; align-items: center; gap: 4px; }

        .card {
            background: #ffffff;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 0.5px solid #c6c6c8;
        }
        .info-label { color: #8e8e93; }

        .btn-blue {
            background: #007aff;
            border: none;
            border-radius: 14px;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            width: 100%;
            cursor: pointer;
            margin-top: 8px;
        }

        .items-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .item-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 12px;
            cursor: pointer;
            border: 1px solid #e5e5ea;
        }
        .item-image {
            width: 100%;
            aspect-ratio: 1;
            background: #e8ecf2;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 10px;
        }
        .item-name { font-size: 14px; font-weight: 600; text-align: center; color: #1c1c1e; }
        .item-price { font-size: 16px; font-weight: 700; color: #007aff; text-align: center; }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 10px 12px 20px;
            border-top: 0.5px solid rgba(0, 0, 0, 0.1);
            border-radius: 24px 24px 0 0;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 500;
            color: #8e8e93;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 30px;
        }
        .nav-item.active { color: #007aff; background: rgba(0, 122, 255, 0.15); }
        .nav-icon { font-size: 20px; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .inventory-item {
            background: #ffffff;
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #e5e5ea;
        }
        .inventory-icon { width: 48px; height: 48px; background: #e8ecf2; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .inventory-info { flex: 1; }
        .inventory-name { font-size: 15px; font-weight: 600; color: #1c1c1e; }
        .inventory-date { font-size: 11px; color: #8e8e93; }

        .logout-btn {
            background: #ff3b30;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-weight: 600;
            color: white;
            width: 100%;
            cursor: pointer;
            margin-top: 16px;
        }

        /* ===== ТЁМНАЯ ТЕМА ===== */
        @media (prefers-color-scheme: dark) {
            body { background: #000000 !important; color: #ffffff !important; }
            .welcome-screen { background: #000000 !important; }
            .welcome-card { background: #1c1c1e !important; }
            .welcome-greeting { color: #ffffff !important; }
            .welcome-name { color: #0a84ff !important; }
            .card { background: #1c1c1e !important; border: 1px solid #2c2c2e !important; box-shadow: none !important; }
            .item-card { background: #1c1c1e !important; border: 1px solid #2c2c2e !important; }
            .item-name { color: #ffffff !important; }
            .item-price { color: #0a84ff !important; }
            .bottom-nav { background: rgba(0, 0, 0, 0.95) !important; border-top-color: rgba(255, 255, 255, 0.1) !important; }
            .nav-item { color: #8e8e93 !important; }
            .nav-item.active { color: #0a84ff !important; background: rgba(0, 122, 255, 0.15) !important; }
            .inventory-item { background: #1c1c1e !important; border: 1px solid #2c2c2e !important; }
            .inventory-name { color: #ffffff !important; }
            .info-row { border-bottom: 0.5px solid #38383a !important; }
            .btn-blue { background: #0a84ff !important; }
            .balance-card { background: linear-gradient(135deg, #0a84ff 0%, #5856d6 100%) !important; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Экран приветствия -->
        <div id="welcomeScreen" class="welcome-screen">
            <div class="welcome-card">
                <div class="welcome-avatar"><span id="welcomeInitial">U</span></div>
                <div class="welcome-greeting">Здравствуйте,</div>
                <div class="welcome-name" id="welcomeName">Игрок</div>
                <button class="welcome-btn" id="enterBtn">Начать</button>
            </div>
        </div>

        <!-- Главное меню -->
        <div id="mainMenu" style="display: none;">
            <!-- Маркет -->
            <div class="tab-content active" id="tab-market">
                <div class="balance-card">
                    <div class="balance-label">Баланс</div>
                    <div class="balance-value" id="balanceValue">500 ★</div>
                    <button class="welcome-btn" id="topupBtn" style="background: rgba(255,255,255,0.2); padding: 8px 16px; width: auto;">Купить</button>
                </div>
                <div class="items-grid" id="itemsGrid"></div>
            </div>

            <!-- Инвентарь -->
            <div class="tab-content" id="tab-inventory">
                <div class="card">
                    <div class="info-row"><span class="info-label">Мои скины</span></div>
                    <div id="inventoryList"></div>
                </div>
            </div>

            <!-- Профиль -->
            <div class="tab-content" id="tab-profile">
                <div class="card">
                    <div class="info-row"><span class="info-label">Имя</span><span id="profileName">user</span></div>
                    <div class="info-row"><span class="info-label">Скинов</span><span id="itemsOwned">0</span></div>
                    <div class="info-row"><span class="info-label">Потрачено</span><span id="totalSpent">0 ★</span></div>
                </div>
                <button class="logout-btn" id="logoutBtn">Выйти</button>
            </div>

            <!-- Нижняя навигация -->
            <div class="bottom-nav">
                <div class="nav-item active" data-tab="market"><span class="nav-icon">🏪</span><span>Маркет</span></div>
                <div class="nav-item" data-tab="inventory"><span class="nav-icon">📦</span><span>Инвентарь</span></div>
                <div class="nav-item" data-tab="profile"><span class="nav-icon">👤</span><span>Профиль</span></div>
            </div>
        </div>
    </div>

    <script>
        // Инициализация
        document.addEventListener('DOMContentLoaded', function() {
            let balance = 500;
            let inventory = [];
            let totalSpent = 0;
            let currentUser = "Игрок";

            // Загрузка сохранений
            try {
                const saved = localStorage.getItem('rusty_market_simple');
                if (saved) {
                    const data = JSON.parse(saved);
                    balance = data.balance || 500;
                    inventory = data.inventory || [];
                    totalSpent = data.totalSpent || 0;
                    currentUser = data.username || "Игрок";
                }
            } catch(e) {}

            // Скины
            const skins = [
                { name: "AK-47 | Золотая лихорадка", price: 1500, icon: "🔥", rarity: "legendary" },
                { name: "Большая Медведица", price: 1200, icon: "🐻", rarity: "legendary" },
                { name: "Лазурный дракон", price: 520, icon: "🐉", rarity: "epic" },
                { name: "Теневой клинок", price: 450, icon: "🗡️", rarity: "epic" },
                { name: "Кровавая луна", price: 480, icon: "🌙", rarity: "epic" },
                { name: "Ледяное сердце", price: 280, icon: "❄️", rarity: "rare" },
                { name: "Ржавый убийца", price: 200, icon: "🔧", rarity: "rare" },
                { name: "Пустынный вихрь", price: 220, icon: "🏜️", rarity: "rare" },
                { name: "Деревянный щит", price: 90, icon: "🛡️", rarity: "common" },
                { name: "Каменный топор", price: 75, icon: "⛏️", rarity: "common" },
                { name: "Ржавая секира", price: 60, icon: "🪓", rarity: "common" }
            ];

            // Элементы
            const welcomeScreen = document.getElementById('welcomeScreen');
            const mainMenu = document.getElementById('mainMenu');
            const enterBtn = document.getElementById('enterBtn');
            const balanceEl = document.getElementById('balanceValue');
            const itemsGrid = document.getElementById('itemsGrid');
            const inventoryList = document.getElementById('inventoryList');
            const profileName = document.getElementById('profileName');
            const itemsOwned = document.getElementById('itemsOwned');
            const totalSpentEl = document.getElementById('totalSpent');
            const logoutBtn = document.getElementById('logoutBtn');
            const topupBtn = document.getElementById('topupBtn');

            function updateUI() {
                balanceEl.textContent = balance + ' ★';
                profileName.textContent = currentUser;
                itemsOwned.textContent = inventory.length;
                totalSpentEl.textContent = totalSpent + ' ★';
                renderInventory();
                renderMarket();
                saveData();
            }

            function renderMarket() {
                itemsGrid.innerHTML = skins.map(skin => `
                    <div class="item-card" data-name="${skin.name}" data-price="${skin.price}" data-icon="${skin.icon}">
                        <div class="item-image">${skin.icon}</div>
                        <div class="item-name">${skin.name}</div>
                        <div class="item-price">${skin.price} ★</div>
                    </div>
                `).join('');

                document.querySelectorAll('.item-card').forEach(card => {
                    card.addEventListener('click', function() {
                        const name = this.dataset.name;
                        const price = parseInt(this.dataset.price);
                        const icon = this.dataset.icon;
                        if (balance >= price) {
                            balance -= price;
                            totalSpent += price;
                            inventory.push({ name, price, icon, date: new Date().toLocaleDateString() });
                            updateUI();
                            alert(`✅ Куплен ${name} за ${price}★!`);
                        } else {
                            alert('❌ Не хватает звёзд!');
                        }
                    });
                });
            }

            function renderInventory() {
                if (inventory.length === 0) {
                    inventoryList.innerHTML = '<div style="text-align:center; padding:20px; color:#8e8e93;">Пусто</div>';
                    return;
                }
                inventoryList.innerHTML = inventory.map(item => `
                    <div class="inventory-item">
                        <div class="inventory-icon">${item.icon}</div>
                        <div class="inventory-info">
                            <div class="inventory-name">${item.name}</div>
                            <div class="inventory-date">${item.date}</div>
                        </div>
                        <div style="color:#007aff; font-weight:600;">${item.price} ★</div>
                    </div>
                `).join('');
            }

            function saveData() {
                localStorage.setItem('rusty_market_simple', JSON.stringify({
                    balance, inventory, totalSpent, username: currentUser
                }));
            }

            // Переключение вкладок
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', function() {
                    const tab = this.dataset.tab;
                    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                    document.getElementById('tab-' + tab).classList.add('active');
                    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                    this.classList.add('active');
                });
            });

            // Вход
            enterBtn.addEventListener('click', function() {
                welcomeScreen.style.display = 'none';
                mainMenu.style.display = 'block';
                updateUI();
            });

            // Выход
            logoutBtn.addEventListener('click', function() {
                localStorage.removeItem('rusty_market_simple');
                welcomeScreen.style.display = 'flex';
                mainMenu.style.display = 'none';
            });

            // Пополнение
            topupBtn.addEventListener('click', function() {
                alert('💎 Пополнение баланса\nПереведите звёзды на @wasxr');
            });

            // Инициализация
            document.getElementById('welcomeName').textContent = currentUser;
            document.getElementById('welcomeInitial').textContent = currentUser.charAt(0).toUpperCase();
        });
    </script>
</body>
</html>
